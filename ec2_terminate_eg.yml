---
- name: Terminate EC2 Instances
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - group_vars/all/aws_secrets.yml

  tasks:
    - name: Terminate EC2 instances
      amazon.aws.ec2_instance:
        state: absent
        region: ap-south-1
        aws_access_key: "{{ aws_access_key }}"
        aws_secret_key: "{{ aws_secret_key }}"
        filters:
          tag:Name:
            - node-1
            - node-2
            - node-3
